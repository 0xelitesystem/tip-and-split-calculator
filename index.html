:root{--bg:#e7ead9;--paper:#fbfdf2;--ink:#23291c;--muted:#5b6149;--line:#b9c19a;
  --green:#2f6b2f;--red:#a63a2a;--field:#fffef6}
html[data-theme=dark]{--bg:#14160f;--paper:#1b1e15;--ink:#e6ead6;--muted:#969c83;--line:#343a26;
  --green:#6fb86f;--red:#df7c6a;--field:#13150d}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Check',monospace;line-height:1.5}
.wrap{max-width:680px;margin:0 auto;padding:26px 18px 56px}
.theme{float:right;font-size:12px;background:var(--field);color:var(--ink);border:1px solid var(--line);border-radius:4px;padding:6px 10px;cursor:pointer}
h1{font-family:'Head';font-weight:400;font-size:34px;text-transform:uppercase;letter-spacing:1px;margin:0 0 2px;color:var(--green)}
.sub{color:var(--muted);font-size:13px;margin:0 0 20px}
.pad{background:var(--paper);border:1px solid var(--line);border-radius:4px;
  background-image:repeating-linear-gradient(transparent,transparent 33px,rgba(47,107,47,.12) 33px,rgba(47,107,47,.12) 34px);
  padding:18px}
.guest{font-family:'Head';color:var(--green);font-size:14px;text-transform:uppercase;letter-spacing:2px;border-bottom:2px solid var(--green);padding-bottom:6px;margin-bottom:12px}
label{display:block;font-size:13px;color:var(--muted);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.5px}
.inrow{display:flex;align-items:center;border:1px solid var(--line);border-radius:4px;background:var(--field)}
.inrow .pre,.inrow .post{padding:0 10px;color:var(--muted)}
input{font-family:'CheckB';font-size:18px;background:transparent;color:var(--ink);border:0;padding:10px;width:100%;outline:none}
.tips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.tips button{font-family:'CheckB';font-size:14px;background:var(--field);color:var(--ink);border:1px solid var(--line);border-radius:4px;padding:8px 12px;cursor:pointer}
.tips button.on{background:var(--green);color:var(--paper);border-color:var(--green)}
.opt{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--muted)}
.opt input{width:auto}
.tot{margin-top:18px;border-top:2px dashed var(--green);padding-top:14px}
.line{display:flex;justify-content:space-between;font-size:16px;padding:5px 0}
.line.big{font-family:'CheckB';font-size:22px;color:var(--green);border-top:1px solid var(--line);margin-top:6px;padding-top:10px}
.per{margin-top:16px;text-align:center;background:var(--field);border:1px solid var(--line);border-radius:6px;padding:16px}
.per .n{font-family:'Head';font-size:44px;color:var(--green);line-height:1}
.per .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
footer{margin-top:34px;border-top:1px solid var(--line);padding-top:14px;font-size:12px;color:var(--muted)}
footer a{color:var(--green)}
</style>
</head>
<body>
<div class="wrap">
<button class="theme" id="theme" type="button">Dark</button>
<h1>Tip and Split</h1>
<p class="sub">Set a tip, split the check, or round up to a clean total.</p>

<div class="pad">
  <div class="guest">Guest Check</div>
  <label for="bill">Bill amount</label>
  <div class="inrow"><span class="pre">$</span><input id="bill" type="number" min="0" step="0.01" value="84.50"></div>

  <label for="tip">Tip percent</label>
  <div class="inrow"><input id="tip" type="number" min="0" step="1" value="20"><span class="post">%</span></div>
  <div class="tips" id="tips">
    <button type="button" data-t="15">15%</button>
    <button type="button" data-t="18">18%</button>
    <button type="button" data-t="20">20%</button>
    <button type="button" data-t="25">25%</button>
  </div>

  <label for="people">Split between</label>
  <div class="inrow"><input id="people" type="number" min="1" step="1" value="3"><span class="post">people</span></div>

  <div class="opt"><input id="roundon" type="checkbox"><label for="roundon" style="margin:0;text-transform:none">Round each person up to the nearest</label></div>
  <div class="inrow" style="margin-top:6px;max-width:180px"><span class="pre">$</span><input id="roundto" type="number" min="0" step="1" value="5"></div>

  <div class="tot" id="tot" aria-live="polite"></div>
  <div class="per" id="per"></div>
</div>

<footer>Client-side only, nothing stored. MIT, 0xelitesystem.
Related: <a href="https://github.com/0xelitesystem/invoice-total-builder">invoice-total-builder</a>,
<a href="https://github.com/0xelitesystem/savings-goal-planner">savings-goal-planner</a>.</footer>
</div>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var money=function(n){return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});};
  function num(id){var v=parseFloat($(id).value);return isFinite(v)?v:0;}

  function calc(){
    var bill=num("bill"), tip=num("tip"), people=Math.max(1,Math.round(num("people")));
    var tipAmt=bill*tip/100, total=bill+tipAmt;
    var perRaw=total/people, per=perRaw, rounded=false;
    if($("roundon").checked){
      var step=num("roundto");
      if(step>0){ per=Math.ceil(perRaw/step)*step; rounded=true; }
    }
    var collected=per*people, extra=collected-total;
    $("tot").innerHTML=''+
      '<div class="line"><span>Subtotal</span><span>'+money(bill)+'</span></div>'+
      '<div class="line"><span>Tip ('+tip+'%)</span><span>'+money(tipAmt)+'</span></div>'+
      '<div class="line big"><span>Total</span><span>'+money(total)+'</span></div>'+
      (rounded?'<div class="line"><span>Collected after rounding</span><span>'+money(collected)+'</span></div>'+
               '<div class="line"><span>Extra over the bill</span><span>'+money(extra)+'</span></div>':'');
    $("per").innerHTML='<div class="n">'+money(per)+'</div><div class="l">per person ('+people+' way split)</div>';
  }

  $("tips").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b)return;
    $("tip").value=b.getAttribute("data-t"); mark(); calc();
  });
  function mark(){
    var v=$("tip").value;
    Array.prototype.forEach.call($("tips").children,function(b){
      b.classList.toggle("on",b.getAttribute("data-t")===v);
    });
  }
  ["bill","tip","people","roundon","roundto"].forEach(function(id){
    $(id).addEventListener("input",function(){mark();calc();});
    $(id).addEventListener("change",function(){mark();calc();});
  });
  var t=$("theme");
  t.addEventListener("click",function(){
    var d=document.documentElement.getAttribute("data-theme")==="dark";
    document.documentElement.setAttribute("data-theme",d?"light":"dark");
    t.textContent=d?"Dark":"Light";
  });
  mark(); calc();
})();
</script>
</body>
</html>
